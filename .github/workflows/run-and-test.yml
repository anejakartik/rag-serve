name: Build and test container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build image
        run: docker build -t rag-serve:ci .
      - name: Run container
        run: |
          cid=$(docker run -d rag-serve:ci)
          echo "container=$cid"
          sleep 4
          ip=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' $cid)
          echo "ip=$ip"
          docker run --rm curlimages/curl:7.85.0 -s http://$ip:8080/ | grep message || (docker logs $cid && exit 1)
          docker rm -f $cid
